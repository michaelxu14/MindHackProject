<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Viewer — Region Atlas</title>
  <meta name="description" content="Interactive 3D brain visualization with labeled regions and cross-section view">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #e0e0e8;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    canvas { display: block; }

    /* ─── Top overlay ─── */
    .overlay-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 20px 28px;
      background: linear-gradient(to bottom, rgba(10,10,15,0.9) 0%, transparent 100%);
      z-index: 10;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brain-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .overlay-top h1 {
      font-size: 20px; font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #c4b5fd, #818cf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .overlay-top .subtitle {
      font-size: 12px;
      color: rgba(200,200,220,0.5);
      font-weight: 300;
      margin-top: 2px;
    }

    /* ─── Bottom controls ─── */
    .overlay-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 28px;
      background: linear-gradient(to top, rgba(10,10,15,0.9) 0%, transparent 100%);
      z-index: 10;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .controls-hint {
      display: flex; gap: 16px;
      font-size: 11px;
      color: rgba(200,200,220,0.4);
      letter-spacing: 0.3px;
    }

    .controls-hint .key {
      display: inline-block;
      padding: 2px 7px; border-radius: 4px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 10px; margin-right: 4px;
      font-family: monospace;
    }

    .stats {
      font-size: 11px;
      color: rgba(200,200,220,0.35);
      text-align: right; line-height: 1.6;
    }

    /* ─── Loading ─── */
    #loading {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a0f;
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease;
    }

    #loading.hidden {
      opacity: 0; pointer-events: none;
    }

    .loader-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(99,102,241,0.15);
      border-top-color: #818cf8;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 14px;
      color: rgba(200,200,220,0.6);
      font-weight: 300;
    }

    .progress-text {
      font-size: 11px;
      color: rgba(200,200,220,0.3);
      font-family: monospace;
    }

    /* ─── Region Tooltip ─── */
    #region-tooltip {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      background: rgba(15, 15, 25, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(129, 140, 248, 0.25);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #e0e0f0;
      white-space: nowrap;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: opacity 0.15s ease;
    }

    #region-tooltip .color-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* ─── Sidebar ─── */
    #sidebar {
      position: fixed;
      top: 70px;
      right: 16px;
      bottom: 60px;
      width: 240px;
      z-index: 20;
      background: rgba(15, 15, 25, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
    }

    #sidebar.collapsed {
      transform: translateX(270px);
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(200,200,220,0.8);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .sidebar-toggle-btn {
      background: none; border: none;
      color: rgba(200,200,220,0.5);
      font-size: 16px; cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }
    .sidebar-toggle-btn:hover { color: #818cf8; }

    /* ─── Cross-Section Controls ─── */
    .section-controls {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .section-controls h3 {
      font-size: 11px;
      font-weight: 600;
      color: rgba(200,200,220,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toggle-row label {
      font-size: 12px;
      color: rgba(200,200,220,0.7);
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 38px; height: 20px;
      cursor: pointer;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      transition: background 0.3s ease;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 2px; top: 2px;
      background: #ccc;
      border-radius: 50%;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(99, 102, 241, 0.5);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
      background: #818cf8;
    }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .slider-row label {
      font-size: 11px;
      color: rgba(200,200,220,0.5);
      min-width: 18px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #818cf8;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(129,140,248,0.4);
    }

    /* Axis selector */
    .axis-btns {
      display: flex; gap: 4px; margin-top: 8px;
    }

    .axis-btn {
      flex: 1;
      padding: 5px 0;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(200,200,220,0.5);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .axis-btn.active {
      background: rgba(99,102,241,0.2);
      border-color: rgba(99,102,241,0.4);
      color: #818cf8;
    }

    .axis-btn:hover:not(.active) {
      background: rgba(255,255,255,0.08);
      color: rgba(200,200,220,0.7);
    }

    /* ─── Region list ─── */
    .region-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .region-list::-webkit-scrollbar { width: 4px; }
    .region-list::-webkit-scrollbar-track { background: transparent; }
    .region-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }

    .region-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }

    .region-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .region-item.active {
      background: rgba(99,102,241,0.12);
    }

    .region-item.dimmed .region-name {
      opacity: 0.3;
    }

    .region-color {
      width: 12px; height: 12px;
      border-radius: 4px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .region-name {
      font-size: 12px;
      color: rgba(200,200,220,0.8);
      line-height: 1.3;
      transition: opacity 0.2s;
    }

    /* ─── Sidebar toggle (when collapsed) ─── */
    #sidebar-open-btn {
      position: fixed;
      top: 76px; right: 16px;
      z-index: 15;
      width: 40px; height: 40px;
      background: rgba(15, 15, 25, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: rgba(200,200,220,0.6);
      font-size: 18px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #sidebar-open-btn:hover {
      background: rgba(99,102,241,0.15);
      color: #818cf8;
    }

    #sidebar-open-btn.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="loader-ring"></div>
    <p>Loading brain regions…</p>
    <div class="progress-text" id="load-status">Initializing</div>
  </div>

  <!-- 3D Canvas -->
  <div id="canvas-container"></div>

  <!-- Region Tooltip -->
  <div id="region-tooltip">
    <span class="color-dot"></span>
    <span class="tooltip-text"></span>
  </div>

  <!-- Top overlay -->
  <div class="overlay-top">
    <div class="brain-icon">🧠</div>
    <div>
      <h1>Brain Viewer</h1>
      <div class="subtitle">Region Atlas — Interactive 3D</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Brain Regions</h2>
      <button class="sidebar-toggle-btn" id="sidebar-close" title="Close panel">✕</button>
    </div>

    <div class="section-controls">
      <h3>Cross-Section</h3>
      <div class="toggle-row">
        <label>Enable clip</label>
        <label class="toggle-switch">
          <input type="checkbox" id="clip-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="slider-row" id="clip-slider-row" style="opacity: 0.3; pointer-events: none;">
        <label>✂️</label>
        <input type="range" id="clip-slider" min="-100" max="100" value="0" step="1">
      </div>
      <div class="axis-btns" id="axis-btns">
        <button class="axis-btn active" data-axis="x">Sagittal</button>
        <button class="axis-btn" data-axis="y">Coronal</button>
        <button class="axis-btn" data-axis="z">Axial</button>
      </div>
    </div>

    <div class="region-list" id="region-list">
      <!-- Populated dynamically -->
    </div>
  </div>

  <!-- Sidebar open button (when collapsed) -->
  <button id="sidebar-open-btn" title="Show regions panel">☰</button>

  <!-- Bottom overlay -->
  <div class="overlay-bottom">
    <div class="controls-hint">
      <span><span class="key">LMB</span> Rotate</span>
      <span><span class="key">RMB</span> Pan</span>
      <span><span class="key">Scroll</span> Zoom</span>
      <span><span class="key">Click</span> Select region</span>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <!-- Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
